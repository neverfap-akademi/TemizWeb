  <style>
    :root {
      --bg:#f4f8f6;--panel:#fff;--text:#17211d;--muted:#5d6a64;
      --border:#d7e1dc;--primary:#176b52;--primary-dark:#10513e;
      --soft:#e8f6f0;--warn:#fff8e7;--warn-border:#e8ce86;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.55}
    main{width:min(860px,calc(100% - 22px));margin:18px auto}
    .panel{padding:24px;border:1px solid var(--border);border-radius:18px;background:var(--panel)}
    h1{margin:0 0 10px;font-size:clamp(27px,6vw,40px);line-height:1.15}
    p{margin:0}
    .muted{color:var(--muted)}
    .notice{margin-top:16px;padding:14px;border:1px solid var(--warn-border);border-radius:13px;background:var(--warn)}
    .list{display:grid;gap:10px;margin-top:18px}
    .link,.button{display:flex;min-height:50px;align-items:center;justify-content:center;padding:12px 15px;border-radius:12px;text-decoration:none;font-weight:800;text-align:center}
    .link{border:1px solid var(--border);background:#f8fbf9;color:var(--text)}
    .button{border:0;background:var(--primary);color:#fff;cursor:pointer;width:100%;font:inherit;font-weight:800}
    .button:hover{background:var(--primary-dark)}
    textarea{width:100%;height:260px;margin-top:16px;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fbfdfc;color:#111;font:12px/1.45 ui-monospace,SFMono-Regular,Consolas,monospace;resize:vertical}
    .nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .status{margin-top:12px;padding:12px;border-radius:12px;background:var(--soft);color:var(--primary-dark);font-weight:700}
    @media(max-width:560px){.panel{padding:18px}.nav{grid-template-columns:1fr}}
  </style>
</head>

<script>

(function(){
  "use strict";
  const area=document.getElementById("filter-text");
  const button=document.getElementById("copy-button");
  const status=document.getElementById("copy-status");
  button.addEventListener("click",async function(){
    try{
      await navigator.clipboard.writeText(area.value);
    }catch(error){
      area.focus();
      area.select();
      area.setSelectionRange(0,area.value.length);
      document.execCommand("copy");
    }
    status.hidden=false;
    status.textContent="Kopyalandı. uBlock Origin Lite'a dönüp yapıştırın ve uygulayın.";
    button.textContent="Kopyalandı ✓";
  });
})();

</script>
