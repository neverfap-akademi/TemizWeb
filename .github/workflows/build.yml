name: Build TemizWeb

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches: [main]
    paths:
      - "filters/src/**"
      - "dns/src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: temizweb-single-builder
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Offline self-test
        run: |
          python scripts/build_all.py --fixture-dir tests/fixtures
          python scripts/check_all.py
      - name: Build current upstream lists
        run: |
          python scripts/build_all.py
          python scripts/check_all.py
      - name: Commit generated outputs
        run: |
          if git diff --quiet -- filters/dist dns/dist; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add filters/dist dns/dist
          git commit -m "chore: refresh generated filter lists"
          git push origin HEAD:main
